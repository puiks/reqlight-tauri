name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (semver, e.g. 0.8.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump to v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Check tag does not exist
        run: |
          if git tag -l "v${{ inputs.version }}" | grep -q "v${{ inputs.version }}"; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Check [Unreleased] has content
        run: |
          CONTENT=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{exit} found{print}' CHANGELOG.md | grep -v '^$' || true)
          if [ -z "$CONTENT" ]; then
            echo "::error::CHANGELOG.md [Unreleased] section is empty. Add entries before releasing."
            exit 1
          fi
          echo "Release notes:"
          echo "$CONTENT"

      - uses: dtolnay/rust-toolchain@stable

      - name: Update version numbers
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json
          sed -i "0,/^version = \".*\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Stamp CHANGELOG.md
        run: |
          VERSION="${{ inputs.version }}"
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [${VERSION}] - ${TODAY}/" CHANGELOG.md

      - name: Update Cargo.lock
        run: |
          cd src-tauri
          cargo check --quiet 2>/dev/null || true

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json CHANGELOG.md
          git commit -m "🔖 Bump version to ${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin main --follow-tags

      - name: Trigger release workflow
        run: gh workflow run release.yml --ref "v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
