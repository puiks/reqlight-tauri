name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Extract release notes
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for current version
        id: notes
        run: |
          # Strip leading 'v' from tag to get version number
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between ## [VERSION] and the next ## [
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Use EOF delimiter for multiline output
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-Intel
            runner: macos-latest
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: macOS-ARM
            runner: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: Windows
            runner: windows-latest
            rust-targets: ''
            args: ''

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Reqlight v__VERSION__
          releaseBody: ${{ needs.prepare.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
