<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Send arrow - pointing upper-right at 45° -->
  <g transform="translate(256,256)">
    <!-- Main arrow body -->
    <path d="M -80,80 L 100,-100 L 100,-20 L 140,-20 L 140,-140 L 20,-140 L 20,-100 L 100,-100"
          fill="none" stroke="white" stroke-width="0" />

    <!-- Cleaner send arrow design -->
    <!-- Arrow: a bold stroke going from bottom-left to upper-right with an arrowhead -->
    <line x1="-90" y1="90" x2="70" y2="-70" stroke="white" stroke-width="40" stroke-linecap="round"/>
    <!-- Arrowhead top arm -->
    <line x1="70" y1="-70" x2="70" y2="20" stroke="white" stroke-width="40" stroke-linecap="round"/>
    <!-- Arrowhead right arm -->
    <line x1="70" y1="-70" x2="-20" y2="-70" stroke="white" stroke-width="40" stroke-linecap="round"/>

    <!-- Speed lines / light rays -->
    <line x1="-140" y1="30" x2="-60" y2="30" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.7"/>
    <line x1="-120" y1="90" x2="-50" y2="90" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
